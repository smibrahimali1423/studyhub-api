services:

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: studyhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data: